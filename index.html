<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>車內降噪</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <div>
    <h1>🎧 車內主動降噪</h1>
    <div class="subtitle">分析車內噪音 · 自適應 EQ · 藍芽輸出</div>
  </div>
</header>

<div class="status-row">
  <span class="dot dot-gray" id="statusDot"></span>
  <span id="statusText">待機</span>
  <span class="badges">
    <span class="badge badge-gray" id="calibBadge">未校正</span>
    <span class="badge badge-blue" id="musicBadge" style="display:none">音樂模式</span>
  </span>
  <span id="overallLevel">— dBFS</span>
</div>

<main>

  <!-- Calibration card -->
  <div class="card">
    <div class="card-title">自我校正</div>
    <div class="controls">
      <p class="hint">校正會播放 2 秒 <strong>16–18 kHz 近超聲波</strong>測試音（大多數人幾乎聽不到）。<br>
        系統藉此測量麥克風、喇叭特性及回聲路徑，請在<strong>安靜環境</strong>下執行。</p>
      <button id="calibrateBtn" class="btn-secondary">開始校正（約 2 秒，幾乎無聲）</button>
      <div id="calibProgress" style="display:none">
        <div class="progress-bar"><div class="progress-fill" id="calibBar"></div></div>
        <span class="dim" id="calibStatus">量測中…</span>
      </div>
    </div>
  </div>

  <!-- Spectrum -->
  <div class="card">
    <div class="card-title">即時頻譜（回聲消除後）</div>
    <canvas id="spectrumCanvas" width="800" height="90"></canvas>
  </div>

  <!-- Noise bands -->
  <div class="card">
    <div class="card-title">偵測到的噪音來源</div>
    <div id="bandsContainer"><p class="dim">尚未啟動</p></div>
  </div>

  <!-- Adaptive EQ -->
  <div class="card">
    <div class="card-title">自適應 EQ 補償增益</div>
    <div id="eqContainer"></div>
  </div>

  <!-- Controls -->
  <div class="card">
    <div class="controls">
      <div class="toggle-row">
        <label for="toggleEQ">自適應 EQ（音樂頻率補償）</label>
        <input type="checkbox" id="toggleEQ" checked />
      </div>
      <div class="toggle-row">
        <label for="toggleMasking">遮蔽音調（車內噪音環境才有效）</label>
        <input type="checkbox" id="toggleMasking" checked />
      </div>
      <label class="file-label">
        <input type="file" id="audioFileInput" accept="audio/*" />
        載入音樂檔案（開啟 AEC 回聲消除）
      </label>
    </div>
  </div>

  <!-- Verification panel -->
  <div class="card" id="verifyCard">
    <div class="card-title">功能驗證</div>
    <div class="controls">

      <!-- Calibration quality -->
      <div class="verify-row" id="calibQualityRow" style="display:none">
        <span id="calibQualityVerdict"></span>
        <p class="hint" id="calibQualityDetail"></p>
        <div class="progress-bar">
          <div class="progress-fill" id="calibQualityBar" style="background: var(--green)"></div>
        </div>
      </div>

      <!-- Test tone -->
      <div class="verify-row">
        <div class="verify-label">
          <strong>音訊輸出測試</strong>
          <span class="hint">確認聲音有送到 HomePod / 藍芽喇叭</span>
        </div>
        <button id="testToneBtn" class="btn-secondary btn-sm" disabled>播放 440 Hz</button>
      </div>

      <!-- A/B compare -->
      <div class="verify-row">
        <div class="verify-label">
          <strong>A/B 比較</strong>
          <span class="hint">暫停 EQ 處理 2 秒再恢復，用耳朵感受差異</span>
        </div>
        <button id="abBtn" class="btn-secondary btn-sm" disabled>A/B 比較</button>
      </div>

      <div id="abStatus" class="ab-status" style="display:none"></div>

    </div>
  </div>

  <button id="startBtn" class="btn-start">開始降噪</button>

</main>

<script type="module" src="js/main.js"></script>
</body>
</html>
